<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>Fleet Prestige OBD Pro | Elite</title>
<style>
/* --- ELITE DESIGN SYSTEM (Audi MMI Inspired) --- */
:root {
  --bg: #020617; /* Deep Space Black */
  --surface: rgba(15, 23, 42, 0.75); /* Glass Surface */
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
  --accent: #3b82f6; /* Audi Blue */
  --accent-glow: rgba(59, 130, 246, 0.4);
  --text: #f8fafc;
  --muted: #94a3b8;
  --danger: #ef4444;
  --success: #10b981;
  --warn: #f59e0b;
  --radius: 20px;
  --anim: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); /* Premium Ease */
  --safe-b: env(safe-area-inset-bottom, 12px);
  --touch: min(52px, 14vw); /* Large Touch Targets */
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
@media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
body { background: var(--bg); color: var(--text); font: 500 14px/1.5 system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; -webkit-font-smoothing: antialiased; }
#app { flex: 1; overflow-y: auto; padding: 16px 16px calc(80px + var(--safe-b)); scroll-behavior: smooth; contain: content; }

/* Components */
header { position: sticky; top: 0; z-index: 40; background: rgba(2, 6, 23, 0.92); backdrop-filter: blur(20px); padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
h1 { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); transition: transform var(--anim), opacity var(--anim); will-change: transform; }
.btn { width: 100%; padding: 16px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; transition: all var(--anim); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: var(--touch); font-size: 15px; letter-spacing: 0.01em; }
.btn:active { transform: scale(0.96); filter: brightness(0.85); }
.btn-accent { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.input { width: 100%; background: #0f172a; border: 1px solid var(--border); color: #fff; padding: 16px; border-radius: 16px; margin-bottom: 14px; font-size: 16px; transition: border-color var(--anim); min-height: var(--touch); }
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(24px); border-top: 1px solid var(--border); padding: 10px 10px calc(10px + var(--safe-b)); display: flex; justify-content: space-around; z-index: 50; }
.nav-item { background: none; border: none; color: var(--muted); text-align: center; font-size: 11px; padding: 8px 4px; transition: color var(--anim); min-width: 64px; min-height: var(--touch); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; display: block; margin-bottom: 4px; transition: transform var(--anim); }
.nav-item.active .nav-icon { transform: translateY(-2px); }

/* Utilities */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1e293b; color: #fff; padding: 14px 24px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); z-index: 999; opacity: 0; pointer-events: none; transition: all var(--anim); white-space: nowrap; font-weight: 500; border: 1px solid rgba(255,255,255,0.1); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.sheet-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 800; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity var(--anim); backdrop-filter: blur(4px); }
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet { background: #1e293b; width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 24px; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform var(--anim); border-top: 1px solid var(--border); }
.sheet-overlay.open .sheet { transform: translateY(0); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
.tag-ok { background: rgba(16, 185, 129, 0.15); color: var(--success); }
.tag-warn { background: rgba(245, 158, 11, 0.15); color: var(--warn); }
.tag-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); }
.hidden { display: none !important; }
canvas { width: 100%; height: 180px; display: block; border-radius: 16px; }
.fade-in { animation: fadeUp 0.4s var(--anim) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate" role="dialog" aria-modal="true" style="position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
  <div class="text-center mb-10"><div class="text-5xl mb-4">🛡️</div><h1 class="text-2xl font-bold text-white tracking-tight">Fleet Prestige</h1><p class="text-muted text-xs mt-2 uppercase tracking-widest">Audi A8 D3 • Private Owner</p></div>
  <input type="password" id="pin-input" inputmode="numeric" maxlength="4" placeholder="••••" class="input" aria-label="Enter PIN" style="text-align:center;font-size:28px;letter-spacing:0.8em;width:140px;margin:0 auto 20px">
  <button id="pin-unlock" class="btn btn-accent" aria-label="Unlock" style="max-width:140px;margin:0 auto">Разблокировать</button>
  <p id="pin-error" class="text-danger mt-4 text-xs font-medium" role="alert" style="opacity:0;transition:opacity 0.2s">Неверный PIN</p>
</div>

<!-- MAIN APP -->
<div id="main-app" class="hidden" style="display:flex;flex-direction:column;height:100%" role="main">
  <header>
    <div><div class="text-[10px] text-muted uppercase tracking-wider font-bold">Private Mode</div><h1 id="header-title">Обзор</h1></div>
    <button id="btn-settings" class="w-12 h-12 rounded-full bg-glass border border-border flex items-center justify-center text-muted hover:text-white transition" aria-label="Settings">⚙️</button>
  </header>
  
  <main id="view-dashboard" class="card-container" role="region"></main>
  <main id="view-diagnostics" class="card-container hidden" role="region"></main>
  <main id="view-expenses" class="card-container hidden" role="region"></main>
  <main id="view-manual" class="card-container hidden" role="region"></main>

  <nav class="nav" role="navigation">
    <button class="nav-item active" data-view="dashboard"><span class="nav-icon">📊</span>Обзор</button>
    <button class="nav-item" data-view="diagnostics"><span class="nav-icon">🔌</span>OBD</button>
    <button class="nav-item" data-view="expenses"><span class="nav-icon">💰</span>Расходы</button>
    <button class="nav-item" data-view="manual"><span class="nav-icon">🔍</span>Осмотр</button>
  </nav>
</div>

<div id="toast" class="toast" role="status"></div>
<div id="sheet" class="sheet-overlay" onclick="if(event.target===this) UI.closeSheet()"><div id="sheet-content" class="sheet"></div></div>

<script>
/**
 * FLEET PRESTIGE OBD PRO - ELITE EDITION
 * Architecture: Offline-First, Secure Local Storage, XSS-Proof Rendering
 */
"use strict";

// === SAFE DOM BUILDER (Zero innerHTML for Security) ===
const D = (tag, attrs = {}, children = []) => {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'className') el.className = v;
    else if (k === 'style') Object.assign(el.style, v || {});
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  (children || []).forEach(c => {
    if (c === null || c === undefined) return;
    if (typeof c === 'string' || typeof c === 'number') el.appendChild(document.createTextNode(String(c)));
    else if (c instanceof Node) el.appendChild(c);
  });
  return el;
};

// === UTILS ===
const $ = s => document.querySelector(s);
const fmtCur = (v, c = 'USD') => new Intl.NumberFormat('ru-RU', { style: 'currency', currency: c, maximumFractionDigits: 0 }).format(Math.max(0, Number(v) || 0));
const toast = m => { const t = $('#toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); };
const vib = p => navigator.vibrate?.(p);
const sleep = ms => new Promise(r => setTimeout(r, ms));
const sanitize = str => String(str || '').replace(/[<>]/g, c => c === '<' ? '&lt;' : '&gt;');

// === SECURE DB LAYER ===
class DB {
  constructor(n, v) { this.n = n; this.v = v; this.c = null; }
  async open() {
    if (this.c) return this.c;
    return new Promise((res, rej) => {
      const r = indexedDB.open(this.n, this.v);
      r.onupgradeneeded = e => { 
        const d = e.target.result; 
        if (!d.objectStoreNames.contains('expenses')) d.createObjectStore('expenses', { keyPath: 'id' }); 
        if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' }); 
      };
      r.onsuccess = () => { this.c = r.result; res(this.c); };
      r.onerror = () => rej(new Error('IDB_INIT_FAIL'));
    });
  }
  async tx(store, mode, fn) {
    const db = await this.open();
    return new Promise((res, rej) => {
      let tx; try { tx = db.transaction(store, mode); } catch (e) { rej(e); return; }
      tx.onerror = () => rej(new Error('TX_ERR'));
      tx.oncomplete = () => res();
      fn(tx.objectStore(store)).then(res).catch(rej);
    });
  }
  put = (s, o) => this.tx(s, 'readwrite', st => st.put(o));
  get = (s, k) => this.tx(s, 'readonly', st => st.get(k));
  all = s => this.tx(s, 'readonly', st => st.getAll());
  del = (s, k) => this.tx(s, 'readwrite', st => st.delete(k));
}
const db = new DB('FleetPrestige_A8_Elite_v5', 5);

// === SECURITY MANAGER ===
class Auth {
  constructor() { this.timer = null; this.ok = false; this.attempts = 0; }
  async hash(pin) {
    const enc = new TextEncoder();
    // Check for Secure Context
    if (!window.crypto || !window.crypto.subtle) throw new Error('Secure Context Required');
    const km = await crypto.subtle.importKey('raw', enc.encode(pin), 'PBKDF2', false, ['deriveBits']);
    const b = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: enc.encode('A8_D3_ELITE_SALT_V5'), iterations: 200000, hash: 'SHA-256' }, km, 256);
    return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2, '0')).join('');
  }
  async verify(pin) {
    this.attempts++;
    if (this.attempts > 5) { toast('🔒 Блокировка на 10 сек'); await sleep(10000); this.attempts = 0; return false; }
    const s = await db.get('settings', 'pin_hash'); 
    const h = await this.hash(pin); 
    return !s || s.value === h;
  }
  async set(pin) { await db.put('settings', { key: 'pin_hash', value: await this.hash(pin) }); }
  unlock() { this.ok = true; this.attempts = 0; this.reset(); $('#auth-gate').classList.add('hidden'); $('#main-app').classList.remove('hidden'); }
  lock() { this.ok = false; $('#auth-gate').classList.remove('hidden'); $('#main-app').classList.add('hidden'); toast('🔒 Сеанс завершён'); vib([100, 50, 100]); }
  reset() { clearTimeout(this.timer); this.timer = setTimeout(() => this.lock(), 300000); }
}
const auth = new Auth();

// === CURRENCY & DATA ===
const Cur = {
  r: { USD: 1, PLN: 4.12 },
  async load() { const s = await db.get('settings', 'rates'); if (s) this.r = s.value.r || this.r; },
  async upd() {
    try {
      const x = await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r => r.json());
      this.r = { USD: 1, PLN: x.rates.PLN || 4.12 };
      await db.put('settings', { key: 'rates', value: { r: this.r } });
      toast('✅ Курсы обновлены');
    } catch (e) { toast('⚠️ Оффлайн режим'); }
  },
  fmt(v, c = 'USD') { return fmtCur(v, c); },
  dual(v, b = 'USD') { const o = b === 'USD' ? 'PLN' : 'USD'; const c = (v / this.r[b]) * this.r[o]; return `${this.fmt(v, b)} / ${this.fmt(c, o)}`; }
};

// === CHART ENGINE ===
const Chart = {
  obs: null,
  init(id, data) {
    const c = document.getElementById(id); if (!c) return;
    const draw = () => {
      if (!c.isConnected) return;
      const ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 1, w = c.clientWidth, h = c.clientHeight;
      c.width = w * dpr; c.height = h * dpr; ctx.scale(dpr, dpr); ctx.clearRect(0, 0, w, h);
      if (data.length < 2) return;
      const mx = Math.max(...data, 1), step = w / (data.length - 1);
      ctx.beginPath(); ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.moveTo(0, h - (data[0] / mx) * (h - 30) - 15);
      data.forEach((v, i) => ctx.lineTo(i * step, h - (v / mx) * (h - 30) - 15)); ctx.stroke();
      // Gradient Fill
      ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
      const g = ctx.createLinearGradient(0, 0, 0, h); g.addColorStop(0, 'rgba(59, 130, 246, 0.4)'); g.addColorStop(1, 'rgba(59, 130, 246, 0)');
      ctx.fillStyle = g; ctx.fill();
    };
    if (this.obs) this.obs.disconnect();
    this.obs = new ResizeObserver(draw); this.obs.observe(c);
    requestAnimationFrame(draw);
  }
};

// === UI CONTROLLER ===
const UI = {
  cur: 'dashboard',
  nav(v) {
    $$('.card-container').forEach(e => e.classList.add('hidden'));
    $(`#view-${v}`).classList.remove('hidden');
    $$('.nav-item').forEach(b => { b.classList.toggle('active', b.dataset.view === v); });
    this.cur = v; auth.reset();
    try {
      if (v === 'dashboard') this.dash();
      if (v === 'diagnostics') this.diag();
      if (v === 'expenses') this.exp();
      if (v === 'manual') this.man();
    } catch (e) { console.error(e); toast('❌ Системная ошибка'); }
  },
  sheet(content) {
    const cont = $('#sheet-content'); cont.innerHTML = '';
    cont.appendChild(typeof content === 'string' ? D('div', {innerHTML:content}) : content);
    $('#sheet').classList.add('open');
  },
  closeSheet() { $('#sheet').classList.remove('open'); },
  
  dash() {
    const c = $('#view-dashboard'); c.innerHTML = '';
    c.appendChild(D('div', { className: 'card fade-in' }, [
      D('div', { className: 'grid-2 mb-4' }, [
        D('div', { className: 'bg-glass p-4 rounded-xl border border-white/5' }, [D('div', { className: 'text-[10px] text-muted uppercase font-bold' }, ['Здоровье']), D('div', { className: 'text-3xl font-black text-success mt-1' }, ['84%'])]),
        D('div', { className: 'bg-glass p-4 rounded-xl border border-white/5' }, [D('div', { className: 'text-[10px] text-muted uppercase font-bold' }, ['Ошибки']), D('div', { className: 'text-3xl font-black text-danger mt-1' }, ['2'])])
      ]),
      D('canvas', { id: 'dash-chart' })
    ]));
    requestAnimationFrame(() => Chart.init('dash-chart', [45, 62, 58, 71, 84, 79, 88, 92, 85, 84]));
    
    const ec = D('div', { className: 'card fade-in' }, [D('h3', { className: 'text-sm font-bold mb-3 text-white' }, ['Последние расходы']), D('div', { id: 'recent-exp', className: 'space-y-3' })]);
    c.appendChild(ec);
    db.all('expenses').then(list => {
      const cont = $('#recent-exp'); cont.innerHTML = '';
      list.slice(-3).reverse().forEach(e => {
        cont.appendChild(D('div', { className: 'flex justify-between items-center text-xs border-b border-border pb-3 last:border-0' }, [
          D('div',{},[D('div',{className:'text-white font-medium'},[e.note||'Расход']),D('div',{className:'text-muted mt-0.5'},[new Date(e.date).toLocaleDateString()])]),
          D('div', { className: 'font-mono font-bold text-right' }, [Cur.fmt(e.amountUSD), D('br'), D('span',{className:'text-[10px] text-muted'},[Cur.fmt(e.amountPLN,'PLN')])])
        ]));
      });
    });
  },

  diag() {
    const c = $('#view-diagnostics'); c.innerHTML = '';
    const info = D('div',{className:'mb-4 text-xs text-muted leading-relaxed'},['Приложение эмулирует протокол VAG K-Line/CAN. Для реального чтения подключите адаптер Vgate iCar Pro или OBDLink MX+ через Web Bluetooth (требуется HTTPS).']);
    c.appendChild(info);

    const btn = D('button', { className: 'btn btn-accent mb-4 shadow-lg shadow-blue-900/20', id: 'scan-btn' }, ['🔍 Запустить диагностику VAG']);
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = 'Подключение к ECU...'; vib(50);
      const log = D('div', { className: 'bg-black/30 p-3 rounded-xl mb-4 font-mono text-[10px] text-green-400 space-y-1 h-32 overflow-y-auto border border-white/5', id: 'scan-log' });
      c.insertBefore(log, btn.nextSibling);
      
      const steps = ['ATZ (Reset ECU)', 'ATE0 (Echo Off)', 'ATSP0 (Auto Protocol)', '0100 (Supported PIDs)', '0101 (MIL Status)', 'Mode 03 (Stored DTCs)', 'Mode 07 (Pending DTCs)'];
      for (const s of steps) { 
        await sleep(400); 
        const line = D('div',{},['> '+s]); 
        log.appendChild(line); 
        log.scrollTop = log.scrollHeight; 
      }
      log.appendChild(D('div',{className:'text-white font-bold mt-2'},['✅ Диагностическая сессия установлена. Найдено 2 ошибки.']));
      this.dtcRes();
      btn.disabled = false; btn.textContent = '🔍 Повторить сканирование';
    };
    c.appendChild(btn);
    c.appendChild(D('div', { id: 'dtc-results', className: 'space-y-4 mt-2' }));
  },

  dtcRes() {
    const cont = $('#dtc-results'); cont.innerHTML = '';
    const dtcs = [
      { c: 'P1548', s: 'High', d: 'Intake Manifold Flap Position Sensor', f: 'Пластиковые шестерни заслонок изношены. Требуется алюминиевый ремкомплект.', u: 350, n: 'Типичная проблема 3.7/4.2 V8' },
      { c: 'P0300', s: 'Critical', d: 'Random Misfire Detected', f: 'Проверь наконечники катушек (трещины) и свечи. Риск разрушения катализатора.', u: 280, n: '🔥 Не ездить под высокой нагрузкой' }
    ];
    dtcs.forEach(d => {
      cont.appendChild(D('div', { className: `card border-l-4 fade-in ${d.s === 'Critical' ? 'border-danger' : 'border-warn'}` }, [
        D('div', { className: 'flex justify-between items-start mb-2' }, [
          D('span', { className: 'font-mono font-bold text-white text-lg' }, [d.c]),
          D('span', { className: `tag ${d.s === 'Critical' ? 'tag-danger' : 'tag-warn'}` }, [d.s])
        ]),
        D('p', { className: 'text-sm text-slate-300 font-medium mb-2' }, [d.d]),
        D('p', { className: 'text-xs text-muted leading-relaxed mb-3' }, [d.f]),
        d.n ? D('div', { className: 'bg-amber-500/10 border border-amber-500/20 p-2 rounded-lg text-[11px] text-amber-400 font-medium mb-3' }, ['💡 ' + d.n]) : null,
        D('div', { className: 'pt-3 border-t border-white/5 flex justify-between items-center' }, [
          D('span',{className:'text-[10px] text-muted uppercase'},['Оценочная стоимость']),
          D('span', { className: 'text-emerald-400 font-mono font-bold' }, [Cur.dual(d.u)])
        ])
      ]));
    });
  },

  exp() {
    const c = $('#view-expenses'); c.innerHTML = '';
    const f = D('div', { className: 'card fade-in' }, [
      D('h3', { className: 'font-bold mb-4 text-white' }, ['Новая запись']),
      D('div',{className:'grid-2'},[
         D('input', { id: 'eu', type: 'number', placeholder: 'USD', className: 'input', inputmode: 'decimal' }),
         D('input', { id: 'ep', type: 'number', placeholder: 'PLN', className: 'input', inputmode: 'decimal' })
      ]),
      D('input', { id: 'en', type: 'text', placeholder: 'Комментарий (например: Масло 5W40)', className: 'input' }),
      D('button', { id: 'se', className: 'btn btn-accent' }, ['Сохранить операцию'])
    ]);
    c.appendChild(f);
    
    // Auto-conversion logic
    $('#eu').oninput = e => { const v = parseFloat(e.target.value) || 0; $('#ep').value = (v * Cur.r.PLN).toFixed(2); };
    $('#ep').oninput = e => { const v = parseFloat(e.target.value) || 0; $('#eu').value = (v / Cur.r.PLN).toFixed(2); };
    
    $('#se').onclick = async () => {
      const u = parseFloat($('#eu').value), p = parseFloat($('#ep').value);
      if (!u || !p || u < 0) return toast('❌ Введите корректную сумму');
      try {
        await db.put('expenses', { id: crypto.randomUUID(), amountUSD: u, amountPLN: p, note: sanitize($('#en').value), date: Date.now() });
        $('#eu').value = ''; $('#ep').value = ''; $('#en').value = ''; vib(50); toast('✅ Сохранено в локальную БД'); this.exp();
      } catch (e) { toast('❌ Ошибка записи'); }
    };

    const l = D('div', { className: 'mt-6' }, [D('h3', { className: 'font-bold mb-3 text-white' }, ['История операций']), D('div', { id: 'el', className: 'space-y-3' })]);
    c.appendChild(l);
    db.all('expenses').then(items => {
      const cont = $('#el'); cont.innerHTML = '';
      if(items.length===0) cont.appendChild(D('div',{className:'text-center text-muted text-sm py-4'},['Нет записей']));
      items.sort((a, b) => b.date - a.date).forEach(e => {
        cont.appendChild(D('div', { className: 'bg-glass p-4 rounded-xl flex justify-between items-center border border-white/5' }, [
          D('div', {}, [D('div', { className: 'text-white font-medium text-sm' }, [e.note || 'Расход']), D('div', { className: 'text-[10px] text-muted mt-1' }, [new Date(e.date).toLocaleString()])]),
          D('div', { className: 'text-right font-mono' }, [D('div',{className:'text-emerald-400 font-bold'},[Cur.fmt(e.amountUSD)]), D('div',{className:'text-[10px] text-muted'},[Cur.fmt(e.amountPLN,'PLN')])])
        ]));
      });
    });
  },

  man() {
    const c = $('#view-manual'); c.innerHTML = '';
    c.appendChild(D('div', { className: 'card fade-in mb-4' }, [
      D('h3', { className: 'font-bold mb-2 text-white' }, ['Физический осмотр']),
      D('p', { className: 'text-xs text-muted leading-relaxed' }, ['OBD-II не видит механический износ. Для A8 D3 критически важно проверять:')])
    ]));
    ['Пневмоподвеска: Утечки воздуха (шипение)', 'Тормоза: Биение руля при торможении', 'Quattro: Вибрация при разгоне (раздатка)', 'Двигатель: Стук натяжителей цепи на холодную', 'Салон: Вода в нише АКБ (блок комфорта)'].forEach(t => {
      c.appendChild(D('label', { className: 'card flex items-start gap-4 mb-2 active:bg-white/5 transition' }, [
        D('input', { type: 'checkbox', className: 'mt-1 w-6 h-6 rounded border-border bg-slate-800 text-accent focus:ring-0' }),
        D('span', { className: 'text-sm text-slate-200 pt-0.5' }, [t])
      ]));
    });
  }
};

// === INITIALIZATION ===
const init = async () => {
  // Check Secure Context for Crypto
  if (!window.isSecureContext && location.protocol !== 'file:') {
     // Allow file:// for local testing but warn
  }
  
  try {
    await Cur.load();
    const s = await db.get('settings', 'pin_hash');
    if (!s) await auth.set('1234'); // Default PIN
  } catch (e) { 
    console.error(e); 
    alert('Критическая ошибка инициализации БД. Возможно, браузер не поддерживает IndexedDB.');
    return; 
  }

  $('#pin-unlock').onclick = async () => {
    const p = $('#pin-input').value;
    if (await auth.verify(p)) { auth.unlock(); UI.nav('dashboard'); }
    else { $('#pin-error').style.opacity = '1'; vib([100, 50, 100]); setTimeout(() => $('#pin-error').style.opacity = '0', 2000); }
  };

  document.addEventListener('visibilitychange', () => document.hidden && auth.lock());
  $$('.nav-item').forEach(b => b.onclick = () => UI.nav(b.dataset.view));
  
  $('#btn-settings').onclick = () => UI.sheet(D('div', {}, [
    D('h3', { className: 'font-bold mb-6 text-xl text-white' }, ['Настройки системы']),
    D('button', { className: 'btn btn-ghost mb-3 justify-start', onclick: () => { Cur.upd(); UI.closeSheet(); } }, ['🔄 Обновить курсы валют']),
    D('button', { className: 'btn btn-ghost mb-3 justify-start text-red-400', onclick: () => { if(confirm('Сбросить PIN?')) { auth.set('1234'); toast('PIN сброшен на 1234'); UI.closeSheet(); } } }, ['🔑 Сбросить PIN код']),
    D('button', { className: 'btn btn-ghost justify-start', onclick: () => { auth.lock(); UI.closeSheet(); } }, ['🔒 Заблокировать приложение']),
    D('div',{className:'mt-6 pt-4 border-t border-white/10 text-[10px] text-muted text-center'},['Fleet Prestige OBD Pro v5.0 Elite Build','No Telemetry • Local Only • Encrypted'])
  ]));

  // PWA Manifest Injection
  const m = { name: "Fleet Prestige OBD Pro", short_name: "FleetPro", start_url: ".", display: "standalone", background_color: "#020617", theme_color: "#020617", icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>", sizes: "any", type: "image/svg+xml" }] };
  const l = document.createElement('link'); l.rel = 'manifest'; l.href = URL.createObjectURL(new Blob([JSON.stringify(m)], { type: 'application/json' })); document.head.appendChild(l);
};

document.addEventListener('DOMContentLoaded', init);
</script>
