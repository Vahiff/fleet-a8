name: Project Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Android project files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files
        shell: bash
        run: |
          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -d app/src/main
          test -f app/src/main/AndroidManifest.xml
